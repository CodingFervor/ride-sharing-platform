version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: ride-postgres
    environment: { POSTGRES_DB: ride_db, POSTGRES_USER: ride, POSTGRES_PASSWORD: ride123 }
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
  redis:
    image: redis:7-alpine
    container_name: ride-redis
    ports: ["6379:6379"]
volumes:
  postgres_data:
